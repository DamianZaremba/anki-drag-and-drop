<div id="drag-and-drop">
  <h3 id="drag-and-drop-title">{{Title}}</h3>
  <div id="drag-and-drop-question">{{Question}}</div>
  <div id="drag-and-drop-answers"></div>
  <div id="drag-and-drop-questions"></div>
</div>
<div id="drag-and-drop-dragged"></div>

<script>
(function () {
  const pairs = [
    {{#Q_1}}{question: `{{Q_1}}`, answer: `{{A_1}}`},{{/Q_1}}{{^Q_1}}{{#A_1}}{question: null, answer: `{{A_1}}`},{{/A_1}}{{/Q_1}}
    {{#Q_2}}{question: `{{Q_2}}`, answer: `{{A_2}}`},{{/Q_2}}{{^Q_2}}{{#A_2}}{question: null, answer: `{{A_2}}`},{{/A_2}}{{/Q_2}}
    {{#Q_3}}{question: `{{Q_3}}`, answer: `{{A_3}}`},{{/Q_3}}{{^Q_3}}{{#A_3}}{question: null, answer: `{{A_3}}`},{{/A_3}}{{/Q_3}}
    {{#Q_4}}{question: `{{Q_4}}`, answer: `{{A_4}}`},{{/Q_4}}{{^Q_4}}{{#A_4}}{question: null, answer: `{{A_4}}`},{{/A_4}}{{/Q_4}}
    {{#Q_5}}{question: `{{Q_5}}`, answer: `{{A_5}}`},{{/Q_5}}{{^Q_5}}{{#A_5}}{question: null, answer: `{{A_5}}`},{{/A_5}}{{/Q_5}}
    {{#Q_6}}{question: `{{Q_6}}`, answer: `{{A_6}}`},{{/Q_6}}{{^Q_6}}{{#A_6}}{question: null, answer: `{{A_6}}`},{{/A_6}}{{/Q_6}}
    {{#Q_7}}{question: `{{Q_7}}`, answer: `{{A_7}}`},{{/Q_7}}{{^Q_7}}{{#A_7}}{question: null, answer: `{{A_7}}`},{{/A_7}}{{/Q_7}}
    {{#Q_8}}{question: `{{Q_8}}`, answer: `{{A_8}}`},{{/Q_8}}{{^Q_8}}{{#A_8}}{question: null, answer: `{{A_8}}`},{{/A_8}}{{/Q_8}}
    {{#Q_9}}{question: `{{Q_9}}`, answer: `{{A_9}}`},{{/Q_9}}{{^Q_9}}{{#A_9}}{question: null, answer: `{{A_9}}`},{{/A_9}}{{/Q_9}}
    {{#Q_10}}{question: `{{Q_10}}`, answer: `{{A_10}}`},{{/Q_10}}{{^Q_10}}{{#A_10}}{question: null, answer: `{{A_10}}`},{{/A_10}}{{/Q_10}}
  ];

  const dragged = document.getElementById('drag-and-drop-dragged');
  const trayEl = document.getElementById('drag-and-drop-questions');
  let held = null, ox = 0, oy = 0, overZone = null;
  const assignments = new Array(pairs.length).fill(null);

  function renderContent(html, imgClass, textClass) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = html;
    const img = wrapper.querySelector('img');
    if (img) {
      if (imgClass) img.className = imgClass;
      img.removeAttribute('width');
      img.removeAttribute('height');
      return img;
    }
    const text = wrapper.textContent.trim();
    if (text) {
      const div = document.createElement('div');
      div.className = textClass;
      div.textContent = text;
      return div;
    }
    return null;
  }

  function setup() {
    sessionStorage.removeItem('drag-and-drop-state');

    if (!pairs.length) return;

    const zonesEl = document.getElementById('drag-and-drop-answers');
    pairs.forEach(function (pair, i) {
      if (!pair.question) return;

      const zoneEl = document.createElement('div');
      zoneEl.className = 'drag-and-drop-zone';
      zoneEl.dataset.zi = i;

      const answerEl = renderContent(pair.question, 'drag-and-drop-zone-answer', 'drag-and-drop-zone-answer-text');
      if (answerEl) zoneEl.appendChild(answerEl);

      const slot = document.createElement('div');
      slot.className = 'drag-and-drop-zone-slot';
      slot.dataset.zi = i;

      const label = document.createElement('div');
      label.className = 'drag-and-drop-zone-slot-label';
      label.textContent = 'drop here';
      slot.appendChild(label);

      zoneEl.appendChild(slot);
      zonesEl.appendChild(zoneEl);
    });

    const order = pairs.map(function (_, idx) { return idx; });
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = order[i]; order[i] = order[j]; order[j] = tmp;
    }

    order.forEach(function (pairIdx) {
      const questionBox = document.createElement('div');
      questionBox.className = 'drag-and-drop-question';
      questionBox.dataset.pi = pairIdx;

      const questionEl = renderContent(pairs[pairIdx].answer, null, 'drag-and-drop-question-text');
      if (questionEl) questionBox.appendChild(questionEl);

      questionBox.addEventListener('pointerdown', startDrag);
      trayEl.appendChild(questionBox);
    });
  }

  function startDrag(e) {
    if (held || e.button > 0) return;
    e.preventDefault();
    held = e.currentTarget;
    held.setPointerCapture(e.pointerId);

    const r = held.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;

    dragged.innerHTML = held.innerHTML;
    dragged.style.left = (e.clientX - ox) + 'px';
    dragged.style.top  = (e.clientY - oy) + 'px';
    dragged.style.display = 'flex';

    held.classList.add('held');
    held.addEventListener('pointermove', moveDrag);
    held.addEventListener('pointerup', endDrag);
    held.addEventListener('pointercancel', endDrag);
  }

  function moveDrag(e) {
    dragged.style.left = (e.clientX - ox) + 'px';
    dragged.style.top  = (e.clientY - oy) + 'px';

    dragged.style.visibility = 'hidden';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    dragged.style.visibility = 'visible';

    const zone = under && under.closest('.drag-and-drop-zone');
    if (zone !== overZone) {
      if (overZone) overZone.classList.remove('over');
      overZone = zone;
      if (overZone) overZone.classList.add('over');
    }
  }

  function endDrag(e) {
    held.removeEventListener('pointermove', moveDrag);
    held.removeEventListener('pointerup', endDrag);
    held.removeEventListener('pointercancel', endDrag);

    held.classList.remove('held');
    dragged.style.display = 'none';
    if (overZone) { overZone.classList.remove('over'); overZone = null; }

    dragged.style.visibility = 'hidden';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    dragged.style.visibility = 'visible';
    const targetZone = under && under.closest('.drag-and-drop-zone');

    if (targetZone) {
      const zi = parseInt(targetZone.dataset.zi);
      const pi = parseInt(held.dataset.pi);
      const slot = targetZone.querySelector('.drag-and-drop-zone-slot');
      const occupant = slot.querySelector('.drag-and-drop-question');
      const fromZone = held.closest('.drag-and-drop-zone');
      const fromZi = fromZone ? parseInt(fromZone.dataset.zi) : -1;

      if (occupant) {
        if (fromZi >= 0) {
          fromZone.querySelector('.drag-and-drop-zone-slot').appendChild(occupant);
          assignments[fromZi] = parseInt(occupant.dataset.pi);
        } else {
          trayEl.appendChild(occupant);
        }
      } else if (fromZi >= 0) {
        assignments[fromZi] = null;
      }

      const lbl = slot.querySelector('.drag-and-drop-zone-slot-label');
      if (lbl) lbl.remove();

      slot.appendChild(held);
      assignments[zi] = pi;
    } else {
      const fz = held.closest('.drag-and-drop-zone');
      if (fz) assignments[parseInt(fz.dataset.zi)] = null;
      trayEl.appendChild(held);
    }

    held = null;
    sessionStorage.setItem('drag-and-drop-state', JSON.stringify(assignments));
  }

  setup();
})();
</script>
