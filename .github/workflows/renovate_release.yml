name: Create Release For Renovate
on: { push: { branches: [ 'main' ] } }
jobs:
  renovate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: infrabits/ci-create-renovate-release@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          create-release: false

  create-release:
    runs-on: ubuntu-latest
    needs: [renovate-release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: infrabits/ci-setup-python@main
        with:
          install_dependencies: true
          install_test_dependencies: false
          install_tox: false

      - name: Create release artifact
        run: poetry run ./scripts/create-package.py

      - name: Create GitHub release
        uses: infrabits/ci-create-missing-release@9b9b256bbdf59a093f847f2d7fa18700eaadffa1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.renovate-release.outputs.tag_name }}
          artifacts: drag-and-drop.apkg
    if: needs.renovate-release.outputs.tag_name != ''
